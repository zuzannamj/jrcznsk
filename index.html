];

const col3Images = [
  "image00021.webp",
  "image00022.webp",

  "image00025.webp",
  "image00026.webp",

];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function buildColumn(id, images, offset = false) {
  const col = document.getElementById(id);
  const shuffled = shuffle(images);

  // First full set
  shuffled.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    col.appendChild(img);
  });

  return new Promise(resolve => {
    // Wait for all images to load before measuring
    const imgs = col.querySelectorAll("img");
    let loaded = 0;

    imgs.forEach(img => {
      if (img.complete) {
        loaded++;
      } else {
        img.onload = () => {
          loaded++;
          if (loaded === imgs.length) finish();
        };
      }
    });

    if (loaded === imgs.length) finish();

    function finish() {
      const oneSetHeight = col.scrollHeight;

      // structural offset for col3
      if (offset) {
        const spacer = document.createElement("div");
        spacer.className = "spacer";
        spacer.style.height = (oneSetHeight / 3) + "px";
        col.prepend(spacer);
      }

      // Duplicate identical set
      shuffled.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        col.appendChild(img);
      });

      resolve(oneSetHeight);
    }
  });
}

window.onload = async () => {

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  const h1 = await buildColumn("col1", col1Images);
  const h2 = await buildColumn("col2", col2Images);
  const h3 = await buildColumn("col3", col3Images, true);

  let pos1 = 0;
  let pos2 = 0;
  let pos3 = 0;

  const speedFast = 60;
  const speedSlow = 45;
  const speedSlightlyFaster = 66; // slightly faster than col1

  let lastTime = null;

  function animate(time) {
    if (!lastTime) lastTime = time;
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    // Column 1 — UP
    pos1 += speedFast * delta;
    if (pos1 >= h1) pos1 -= h1;
    col1.style.transform = `translateY(-${pos1}px)`;

    // Column 2 — DOWN slower
    pos2 += speedSlow * delta;
    if (pos2 >= h2) pos2 -= h2;
    col2.style.transform = `translateY(${pos2 - h2}px)`;

    // Column 3 — UP slightly faster
    pos3 += speedSlightlyFaster * delta;
    if (pos3 >= h3) pos3 -= h3;
    col3.style.transform = `translateY(-${pos3}px)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
};

</script>

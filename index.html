<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>jrcznsk.com</title>

<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  height: 100%;
  width: 100%;
}

.columns {
  position: fixed;
  inset: 0;
  display: flex;
  overflow: hidden;
}

.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.col img {
  width: 100%;
  height: 50vh;
  object-fit: cover;
  object-position: center;
  flex-shrink: 0;
}

.spacer {
  width: 100%;
  flex-shrink: 0;
}

.contact {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  font-family: 'Rock Salt', cursive;
  font-size: 6vw;
  z-index: 10;
  display: flex;
  gap: 1vw;
  align-items: baseline;
}

.contact .label {
  color: rgba(226, 201, 122, 0.7);
}

.contact .email {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
}

.contact .email:hover {
  text-decoration: underline;
}

@media (min-width: 768px) {
  .contact { font-size: 3vw; }
}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DJ852Y340W"></script>

window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DJ852Y340W');

</head>
<body>

<div class="columns">
  <div class="col" id="col1"></div>
  <div class="col" id="col2"></div>
  <div class="col" id="col3"></div>
</div>

<div class="contact">
  <span class="label">Contact:</span>
  <a class="email" href="mailto:zu@jrcznsk.com?subject=[jrcznsk.com]">zu@jrcznsk.com</a>
</div>
<script>
function buildColumn(id, images, offset = false) {
  const col = document.getElementById(id);
  const shuffled = shuffle(images);

  for (let i = 0; i < 2; i++) {
    shuffled.forEach(src => {
      const img = document.createElement("img");
      img.src = src;

      // FIX
      img.loading = "eager";
      img.decoding = "async";

      col.appendChild(img);
    });
  }

  if (offset) {
    const oneSetHeight = images.length * window.innerHeight * 0.5;
    const spacer = document.createElement("div");
    spacer.className = "spacer";
    spacer.style.height = (oneSetHeight / 3) + "px";
    col.prepend(spacer);
  }

  return images.length * window.innerHeight * 0.5;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jrcznsk.com</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}

.wrapper {
  display: flex;
  height: 100vh;
  width: 100vw;
}

.column {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.track {
  display: flex;
  flex-direction: column;
}

.column img {
  width: 100%;
  height: auto;
  display: block;
}

.col1 .track {
  animation: scrollUp 40s linear infinite;
}

.col2 .track {
  animation: scrollDown 55s linear infinite;
}

.col3 .track {
  animation: scrollUp 40s linear infinite;
}

/* offset column 3 */
.col3 .track {
  animation-delay: -13s;
}

@keyframes scrollUp {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

@keyframes scrollDown {
  0% { transform: translateY(-50%); }
  100% { transform: translateY(0); }
}

.contact {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: #e8d8b0;
  font-size: 28px;
  font-family: cursive;
  z-index: 10;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="column col1"><div class="track" id="track1"></div></div>
  <div class="column col2"><div class="track" id="track2"></div></div>
  <div class="column col3"><div class="track" id="track3"></div></div>
</div>

<div class="contact">Contact: zu@jrcznsk.com</div>
<script>
const col1Images = [
"IMG_3955.jpeg","IMG_3961.jpeg","IMG_3973.jpeg","IMG_3982.jpeg",
"IMG_3967.jpeg","IMG_3976.jpeg","IMG_3989.jpeg","IMG_3962.jpeg","IMG_3978.jpeg"
];

const col2Images = [
"IMG_3956.jpeg","IMG_3963.jpeg","IMG_3974.jpeg","IMG_3983.jpeg",
"IMG_3970.jpeg","IMG_3977.jpeg","IMG_3986.jpeg","IMG_3969.jpeg","IMG_3979.jpeg"
];

const col3Images = [
"IMG_3957.jpeg","IMG_3958.jpeg","IMG_3960.jpeg","IMG_3971.jpeg",
"IMG_3972.jpeg","IMG_3975.jpeg","IMG_3984.jpeg","IMG_3987.jpeg"
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function buildColumn(images, trackId) {
  const track = document.getElementById(trackId);
  shuffle(images);

  // Build once
  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    track.appendChild(img);
  });

  // Clone entire content once (this is the key fix)
  const clone = track.cloneNode(true);
  while (clone.firstChild) {
    track.appendChild(clone.firstChild);
  }
}

buildColumn(col1Images, "track1");
buildColumn(col2Images, "track2");
buildColumn(col3Images, "track3");
</script>
</body>
</html>

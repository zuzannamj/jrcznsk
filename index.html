let col1Images = [];
let col2Images = [];
let col3Images = [];

// --- SHUFFLE ---

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// --- DISTRIBUTE FILENAMES ONLY ---

function distributeImages() {

  const shuffled = shuffle(allImages);

  shuffled.forEach((img, i) => {
    if (i % 3 === 0) col1Images.push(img);
    else if (i % 3 === 1) col2Images.push(img);
    else col3Images.push(img);
  });
}

// --- PROGRESSIVE INTERLEAVED LOADING ---

function buildColumnsInterleaved() {

  distributeImages();

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  const maxLength = Math.max(
    col1Images.length,
    col2Images.length,
    col3Images.length
  );

  let i = 0;

  function loadNextBatch() {

    if (i >= maxLength) {
      // duplicate after all loaded (for infinite scroll)
      col1.innerHTML += col1.innerHTML;
      col2.innerHTML += col2.innerHTML;
      col3.innerHTML += col3.innerHTML;
      return;
    }

    if (col1Images[i]) {
      const img = new Image();
      img.loading = "eager";
      img.decoding = "async";
      img.src = col1Images[i];
      col1.appendChild(img);
    }

    if (col2Images[i]) {
      const img = new Image();
      img.loading = "eager";
      img.decoding = "async";
      img.src = col2Images[i];
      col2.appendChild(img);
    }

    if (col3Images[i]) {
      const img = new Image();
      img.loading = "eager";
      img.decoding = "async";
      img.src = col3Images[i];
      col3.appendChild(img);
    }

    i++;

    // Load next trio on next animation frame
    requestAnimationFrame(loadNextBatch);
  }

  loadNextBatch();

  return {
    h1: col1Images.length * window.innerHeight * 0.5,
    h2: col2Images.length * window.innerHeight * 0.5,
    h3: col3Images.length * window.innerHeight * 0.5
  };
}

// --- START EVERYTHING ---

window.onload = () => {

  const { h1, h2, h3 } = buildColumnsInterleaved();

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  let pos1 = 0;
  let pos2 = 0;
  let pos3 = 0;

  const speedFast = 60;
  const speedSlow = 45;
  const speedSlightlyFaster = 66;

  let lastTime = null;

  function animate(time) {

    if (!lastTime) lastTime = time;
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    pos1 += speedFast * delta;
    if (pos1 >= h1) pos1 -= h1;
    col1.style.transform = `translateY(-${pos1}px)`;

    pos2 += speedSlow * delta;
    if (pos2 >= h2) pos2 -= h2;
    col2.style.transform = `translateY(${pos2 - h2}px)`;

    pos3 += speedSlightlyFaster * delta;
    if (pos3 >= h3) pos3 -= h3;
    col3.style.transform = `translateY(-${pos3}px)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
};

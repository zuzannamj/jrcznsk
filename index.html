<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Analog Imperfection | Lo-Fi Retro Photography</title>

<meta name="description" content="Lo-fi photography with retro vibes, embracing blur, grain, misframes, and imperfect color. Mostly analog, sometimes digital, but always imperfect and intentionally unpolished." />

<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  height: 100%;
  width: 100%;
  cursor: pointer;
}

.columns {
  position: fixed;
  inset: 0;
  display: flex;
  overflow: hidden;
}

.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.col img {
  width: 100%;
  height: 50vh;
  object-fit: cover;
  object-position: center;
  flex-shrink: 0;
  pointer-events: none;
}

.contact {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  font-family: 'Rock Salt', cursive;
  font-size: 6vw;
  z-index: 10;
  display: flex;
  gap: 1vw;
  align-items: baseline;
  pointer-events: none;
}

.contact .label {
  color: rgba(226, 201, 122, 0.7);
}

.contact .email {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
}

@media (min-width: 768px) {
  .contact { font-size: 3vw; }
}
</style>

</head>
<body>

<div class="columns" id="columns"></div>

<div class="contact">
  <span class="label">Contact:</span>
  <span class="email">zu@jrcznsk.com</span>
</div>

<script>

// --- IMAGE ARRAYS ---

const arrays = [
[
  "image00001.webp","image00002.webp","image00003.webp","image00004.webp",
  "image00005.webp","image00006.webp","image00007.webp","image00008.webp",
  "image00009.webp","image00010.webp","DSCF4607.webp","F1000002.webp",
  "image000042.webp","image000072.webp","image000102.webp","DSCF4700.webp"
],
[
  "image00011.webp","image00012.webp","image00013.webp","image00014.webp",
  "image00015.webp","image00016.webp","image00017.webp","image00018.webp",
  "image00019.webp","image00020.webp","IMG_1068.webp","IMG_1599.webp",
  "image000032.webp","image000092.webp","image000112.webp"
],
[
  "image00021.webp","image00022.webp","image00023.webp","image00024.webp",
  "image00025.webp","image00026.webp","image00027.webp","image00028.webp",
  "image00029.webp","image00030.webp","IMG_1839.webp","IMG_5408.webp",
  "image000052.webp","image000062.webp"
]
];

let animationHandles = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function calculateColumnCount() {
  const viewportWidth = window.innerWidth;
  return Math.max(3, Math.floor(viewportWidth / 300));
}

function buildLayout() {

  const container = document.getElementById("columns");
  container.innerHTML = "";
  animationHandles.forEach(cancelAnimationFrame);
  animationHandles = [];

  const columnCount = calculateColumnCount();

  for (let i = 0; i < columnCount; i++) {

    const col = document.createElement("div");
    col.className = "col";

    const sourceArray = shuffle(arrays[i % 3]);

    sourceArray.forEach(src => {
      const img = document.createElement("img");
      img.src = src;
      col.appendChild(img);
    });

    col.innerHTML += col.innerHTML;

    container.appendChild(col);

    animateColumn(col, sourceArray.length, i);
  }
}

function animateColumn(col, imageCount, index) {

  let pos = 0;
  const height = imageCount * window.innerHeight * 0.5;

  const baseSpeeds = [60, 45, 66];
  const speed = baseSpeeds[index % 3];

  let lastTime = null;

  function animate(time) {

    if (!lastTime) lastTime = time;
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    pos += speed * delta;
    if (pos >= height) pos -= height;

    if (index % 3 === 1) {
      col.style.transform = `translateY(${pos - height}px)`;
    } else {
      col.style.transform = `translateY(-${pos}px)`;
    }

    animationHandles[index] = requestAnimationFrame(animate);
  }

  animationHandles[index] = requestAnimationFrame(animate);
}

// --- GLOBAL CLICK MAILTO ---

document.addEventListener("click", () => {
  window.location.href = "mailto:zu@jrcznsk.com?subject=[jrcznsk.com]";
});

// --- INIT ---

buildLayout();

window.addEventListener("resize", () => {
  buildLayout();
});

</script>

</body>
</html>

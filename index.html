<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>jrcznsk.com</title>

<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  height: 100%;
  width: 100%;
}

.columns {
  position: fixed;
  inset: 0;
  display: flex;
  overflow: hidden;
}

.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.col img {
  width: 100%;
  height: 50vh;
  object-fit: cover;
  object-position: center;
  flex-shrink: 0;
}

.contact {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  font-family: 'Rock Salt', cursive;
  font-size: 6vw;
  z-index: 10;
  display: flex;
  gap: 1vw;
  align-items: baseline;
}

.contact .label {
  color: rgba(226, 201, 122, 0.7);
}

.contact .email {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
}

.contact .email:hover {
  text-decoration: underline;
}

@media (min-width: 768px) {
  .contact { font-size: 3vw; }
}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DJ852Y340W"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DJ852Y340W');
</script>

</head>
<body>

<div class="columns">
  <div class="col" id="col1"></div>
  <div class="col" id="col2"></div>
  <div class="col" id="col3"></div>
</div>

<div class="contact">
  <span class="label">Contact:</span>
  <a class="email" href="mailto:zu@jrcznsk.com">zu@jrcznsk.com</a>
</div>

<script>

const col1Images = ["IMG_3587.jpeg","IMG_3592.jpeg","IMG_3590.jpeg"];
const col2Images = ["IMG_3591.jpeg","IMG_3588.jpeg","IMG_3598.jpeg"];
const col3Images = ["IMG_3596.jpeg","IMG_3600.jpeg","IMG_3587.jpeg"];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function populateColumn(id, images) {
  const col = document.getElementById(id);
  const shuffled = shuffle(images);

  // Add first full set
  shuffled.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    col.appendChild(img);
  });

  // Duplicate until tall enough
  while (col.scrollHeight < window.innerHeight * 3) {
    shuffled.forEach(src => {
      const img = document.createElement("img");
      img.src = src;
      col.appendChild(img);
    });
  }

  return col.scrollHeight / 2;
}

window.onload = () => {

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  const h1 = populateColumn("col1", col1Images);
  const h2 = populateColumn("col2", col2Images);
  const h3 = populateColumn("col3", col3Images);

  let pos1 = 0;
  let pos2 = 0;
  let pos3 = h3 / 3;   // TRUE 1/3 offset

  const speedFast = 60;
  const speedSlow = 45;

  let lastTime = null;

  function animate(time) {
    if (!lastTime) lastTime = time;
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    // Column 1 — UP
    pos1 += speedFast * delta;
    if (pos1 >= h1) pos1 -= h1;
    col1.style.transform = `translateY(-${pos1}px)`;

    // Column 2 — DOWN slower
    pos2 += speedSlow * delta;
    if (pos2 >= h2) pos2 -= h2;
    col2.style.transform = `translateY(${pos2 - h2}px)`;

    // Column 3 — UP with real offset
    pos3 += speedFast * delta;
    if (pos3 >= h3) pos3 -= h3;
    col3.style.transform = `translateY(-${pos3}px)`;

    requestAnimationFrame(animate);
  }

  // APPLY INITIAL OFFSET IMMEDIATELY
  col3.style.transform = `translateY(-${pos3}px)`;

  requestAnimationFrame(animate);
};

</script>
</body>
</html>

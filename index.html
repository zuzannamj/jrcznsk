<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- Title of the website -->
  <title>Analog Imperfection | Lo-Fi Retro Photography</title>
  
  <!-- Meta description for SEO and social previews -->
  <meta name="description" content="Lo-fi photography with retro vibes, embracing blur, grain, misframes, and imperfect color. Mostly analog, sometimes digital, but always imperfect and intentionally unpolished." />



<link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  height: 100%;
  width: 100%;
}

.columns {
  position: fixed;
  inset: 0;
  display: flex;
  overflow: hidden;
}

.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  will-change: transform;
}

.col img {
  width: 100%;
  height: 50vh;
  object-fit: cover;
  object-position: center;
  flex-shrink: 0;
}

.spacer {
  width: 100%;
  flex-shrink: 0;
}

.contact {
  position: fixed;
  bottom: 2vh;
  right: 2vw;
  font-family: 'Rock Salt', cursive;
  font-size: 6vw;
  z-index: 10;
  display: flex;
  gap: 1vw;
  align-items: baseline;
}

.contact .label {
  color: rgba(226, 201, 122, 0.7);
}

.contact .email {
  color: rgba(255,255,255,0.7);
  text-decoration: none;
}

.contact .email:hover {
  text-decoration: underline;
}

@media (min-width: 768px) {
  .contact { font-size: 3vw; }
}

<body>

<div class="columns">
  <div class="col" id="col1"></div>
  <div class="col" id="col2"></div>

<div class="contact">
  <span class="label">Contact:</span>
  <a class="email" href="mailto:zu@jrcznsk.com?subject=[jrcznsk.com]">zu@jrcznsk.com</a>
</div>

<script>

// --- MASTER IMAGE ARRAY ---

const allImages = [
  "DSCF4607.webp",
  "DSCF4700.webp",
  "DSCF4864.webp",
  "DSCF4866.webp",
  "DSCF4876.webp",
  "DSCF4881.webp",
  "DSCF4884.webp",
  "DSCF4886.webp",
  "DSCF4891.webp",
  "DSCF4900.webp",
  "DSCF4935.webp",
  "DSCF4941.webp",
  "DSCF5173.webp",
  "DSCF5298.webp",

  "F1000002.webp",

  "IMG_1068.webp",
  "IMG_1599.webp",
  "IMG_1839.webp",
  "IMG_5408.webp",

  "image00001.webp",
  "image00002.webp",
  "image00003.webp",
  "image00004.webp",
  "image00005.webp",
  "image00006.webp",
  "image00007.webp",
  "image00008.webp",
  "image00009.webp",
  "image00010.webp",

  "image00011.webp",
  "image00012.webp",
  "image00013.webp",
  "image00014.webp",
  "image00015.webp",
  "image00016.webp",
  "image00017.webp",
  "image00018.webp",
  "image00019.webp",
  "image00020.webp",

  "image00021.webp",
  "image00022.webp",
  "image00023.webp",
  "image00024.webp",
  "image00025.webp",
  "image00026.webp",
  "image00027.webp",
  "image00028.webp",
  "image00029.webp",
  "image00030.webp",

  "image000032.webp",
  "image000042.webp",
  "image000052.webp",
  "image000062.webp",
  "image000072.webp",
  "image000092.webp",
  "image000102.webp",
  "image000112.webp"
];

let col1Images = [];
let col2Images = [];
let col3Images = [];

// --- SHUFFLE ---

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

// --- DISTRIBUTE EQUALLY ---

function distributeImages() {

  const shuffled = shuffle(allImages);

  shuffled.forEach((img, i) => {
    if (i % 3 === 0) col1Images.push(img);
    else if (i % 3 === 1) col2Images.push(img);
    else col3Images.push(img);
  });
}

function buildColumnsInterleaved() {

  distributeImages();

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  const maxLength = Math.max(
    col1Images.length,
    col2Images.length,
    col3Images.length
  );

  for (let i = 0; i < maxLength; i++) {

    if (col1Images[i]) {
      const img1 = document.createElement("img");
      img1.src = col1Images[i];
      col1.appendChild(img1);
    }

    if (col2Images[i]) {
      const img2 = document.createElement("img");
      img2.src = col2Images[i];
      col2.appendChild(img2);
    }

    if (col3Images[i]) {
      const img3 = document.createElement("img");
      img3.src = col3Images[i];
      col3.appendChild(img3);
    }
  }

  col1.innerHTML += col1.innerHTML;
  col2.innerHTML += col2.innerHTML;
  col3.innerHTML += col3.innerHTML;

  return {
    h1: col1Images.length * window.innerHeight * 0.5,
    h2: col2Images.length * window.innerHeight * 0.5,
    h3: col3Images.length * window.innerHeight * 0.5
  };
}

window.onload = () => {

  const { h1, h2, h3 } = buildColumnsInterleaved();

  const col1 = document.getElementById("col1");
  const col2 = document.getElementById("col2");
  const col3 = document.getElementById("col3");

  let pos1 = 0;
  let pos2 = 0;
  let pos3 = 0;

  const speedFast = 60;
  const speedSlow = 45;
  const speedSlightlyFaster = 66;

  let lastTime = null;

  function animate(time) {

    if (!lastTime) lastTime = time;
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    pos1 += speedFast * delta;
    if (pos1 >= h1) pos1 -= h1;
    col1.style.transform = `translateY(-${pos1}px)`;

    pos2 += speedSlow * delta;
    if (pos2 >= h2) pos2 -= h2;
    col2.style.transform = `translateY(${pos2 - h2}px)`;

    pos3 += speedSlightlyFaster * delta;
    if (pos3 >= h3) pos3 -= h3;
    col3.style.transform = `translateY(-${pos3}px)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
};

</script>

</body>
</html>
